###############################################################################
# Apache Reverse Proxy Configuration for pgAdmin
###############################################################################
# This configuration file controls the Apache reverse proxy setup for pgAdmin,
# allowing you to access pgAdmin via a custom domain with optional SSL.
# 
# IMPORTANT: Secure this file after editing
#   chmod 600 install_config_proxy.conf
#
# Prerequisites:
#   - PostgreSQL and pgAdmin must already be installed
#   - Run install_postgresql_pgadmin.sh first
#
# Usage:
#   1. Edit this file with your desired settings
#   2. Secure the file: chmod 600 install_config_proxy.conf
#   3. Run: sudo ./install_apache_reverse_proxy.sh
###############################################################################

# ====================
# Domain Configuration
# ====================

# Custom domain name for local access
# This will be added to your /etc/hosts file
# Examples: "postgresql.local", "pgadmin.dev", "db.local"
DOMAIN_NAME="postgresql.local"

# ====================
# SSL Configuration
# ====================

# Enable SSL with self-signed certificate (yes/no)
# Recommended: "yes" for HTTPS access
ENABLE_SSL="yes"

# SSL Certificate Details
# Used for generating self-signed certificates

# Country code (2 letters)
# Example: US, UK, CA, DE, IN
SSL_COUNTRY="US"

# State or province
# Example: "California", "New York", "Ontario"
SSL_STATE="California"

# City
# Example: "San Francisco", "New York City", "Toronto"
SSL_CITY="San Francisco"

# Organization name
# Example: "Development", "MyCompany", "Personal"
SSL_ORG="Development"

# Organizational Unit (optional)
# Example: "IT", "Engineering", "DevOps"
SSL_ORG_UNIT="IT"

# Common Name (optional, defaults to DOMAIN_NAME if not set)
# Usually same as DOMAIN_NAME
# Example: "postgresql.local"
SSL_COMMON_NAME=""

# Certificate validity in days
# Example: 365 (1 year), 730 (2 years)
SSL_DAYS_VALID="365"

# ====================
# Apache Configuration
# ====================

# VirtualHost configuration file name (without .conf extension)
# This will create: /etc/apache2/sites-available/${APACHE_CONFIG_NAME}.conf
# Example: "pgadmin-proxy", "postgresql-vhost"
APACHE_CONFIG_NAME="pgadmin-proxy"

# HTTP port (usually 80)
HTTP_PORT="80"

# HTTPS port (usually 443)
HTTPS_PORT="443"

# ====================
# Backup Configuration
# ====================

# Base directory for backup files
# A timestamped subdirectory will be created
BACKUP_BASE_DIR="/tmp/apache_proxy_backup"

# ====================
# Verification Settings
# ====================

# Timeout (in seconds) for connectivity verification tests
VERIFY_TIMEOUT="10"

# ====================
# Logging
# ====================

# Log file location for the proxy setup script
LOG_FILE="/var/log/apache_proxy_setup.log"

###############################################################################
# Advanced Options (Usually not needed)
###############################################################################

# pgAdmin backend URL (for proxy pass configuration)
# Default is the WSGI served location
# Usually does not need to be changed
# PGADMIN_BACKEND="http://127.0.0.1/pgadmin4"

###############################################################################
# End of Configuration
###############################################################################
