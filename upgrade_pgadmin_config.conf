###############################################################################
# pgAdmin Upgrade Configuration (TEMPLATE)
###############################################################################
# This template controls the pgAdmin upgrade process.
#
# HOW TO USE THIS TEMPLATE:
#   1. Copy this file to a local, untracked config:
#        cp upgrade_pgadmin_config.conf upgrade_pgadmin_config.conf.local
#      or:
#        cp upgrade_pgadmin_config.conf.example upgrade_pgadmin_config.conf
#   2. Add the real config file (e.g. upgrade_pgadmin_config.conf or
#      upgrade_pgadmin_config.conf.local) to .gitignore so it is not committed.
#   3. Edit the copied config file with your environment-specific settings.
#   4. Secure the real config file after editing:
#        chmod 600 upgrade_pgadmin_config.conf
#        # or: chmod 600 upgrade_pgadmin_config.conf.local
#   5. Run the upgrade script:
#        sudo ./upgrade_pgadmin.sh
###############################################################################

# ====================
# Target Version
# ====================

# Target pgAdmin version to upgrade to
# Options:
#   - "latest"  : Upgrade to the latest available version in repository
#   - "9.13"    : Short version (script will resolve to latest matching full version like 9.13-1)
#   - "9.13-1"  : Specific full APT version (exact version string)
# 
# To see available versions: apt-cache policy pgadmin4-web
TARGET_VERSION="latest"

# ====================
# Backup Settings
# ====================

# Base directory for backup files (timestamped subdirectory will be created)
BACKUP_BASE_DIR="/tmp/pgadmin_upgrade_backup"

# Preserve pgAdmin user data during upgrade (server connections, preferences)
# Options: "yes" or "no"
# Recommended: "yes" to keep your saved server connections and settings
PRESERVE_USER_DATA="yes"

# ====================
# Upgrade Behavior
# ====================

# Automatically rollback on verification failure
# Options: "yes" or "no"
# Recommended: "yes" for automatic recovery
AUTO_ROLLBACK_ON_FAILURE="yes"

# Dry run mode (perform all checks and backups but skip actual upgrade)
# Options: "yes" or "no"
# Useful for testing the upgrade process without making changes
DRY_RUN="no"

# ====================
# Verification Settings
# ====================

# Timeout (in seconds) for HTTP connectivity tests
VERIFY_TIMEOUT=10

# Custom domain to test (if you configured a custom domain via reverse proxy)
# Leave empty if you only use the default http://localhost/pgadmin4/
# Example: "postgresql.local"
CUSTOM_DOMAIN=""

# Test HTTPS connectivity (only if SSL is configured)
# Options: "yes" or "no"
TEST_HTTPS="no"

# ====================
# Logging
# ====================

# Log file location (will be created if it doesn't exist)
LOG_FILE="/var/log/pgadmin_upgrade.log"

# ====================
# Advanced Options
# ====================

# Skip pre-flight checks (NOT RECOMMENDED)
# Options: "yes" or "no"
SKIP_PREFLIGHT_CHECKS="no"

# Backup Apache configuration files
# Options: "yes" or "no"
BACKUP_APACHE_CONFIGS="yes"

# Backup SSL certificates
# Options: "yes" or "no"
BACKUP_SSL_CERTS="yes"

# Force upgrade even if same version
# Options: "yes" or "no"
FORCE_UPGRADE="no"

###############################################################################
# End of Configuration
###############################################################################
