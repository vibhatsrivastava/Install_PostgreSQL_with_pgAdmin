###############################################################################
# pgVector Extension Installation Configuration
###############################################################################
# This configuration file controls the installation of the pgvector extension
# for PostgreSQL databases.
# 
# IMPORTANT: Secure this file after editing
#   chmod 600 configs/install_pgvector_config.conf
#
# Usage:
#   1. Edit this file with your desired settings
#   2. Secure the file: chmod 600 configs/install_pgvector_config.conf
#   3. Run: sudo ./install_pgvector.sh
###############################################################################

# ====================
# PostgreSQL Settings
# ====================

# PostgreSQL version to target (e.g., "16", "15", "14")
# Leave empty to auto-detect the installed version
# Example: POSTGRES_VERSION="16"
POSTGRES_VERSION=""

# ====================
# Database Configuration
# ====================

# Comma-separated list of databases to enable pgvector in
# Example: TARGET_DATABASES="mydb,appdb,vectordb"
# REQUIRED: Must specify at least one database
TARGET_DATABASES="postgres"

# Enable pgvector in template1 database (yes/no)
# If "yes", all future databases created will have pgvector enabled automatically
# Recommended: "no" for selective installation, "yes" for universal availability
ENABLE_IN_TEMPLATE1="no"

# ====================
# Verification Settings
# ====================

# Run comprehensive verification tests after installation (yes/no)
# Tests include: vector creation, L2/cosine distance, indexing
# Recommended: "yes" to ensure proper installation
RUN_VERIFICATION_TESTS="yes"

# Vector dimension to use in verification tests (default: 3)
# This only affects test vectors, not your actual data
TEST_VECTOR_DIMENSION="3"

# ====================
# Logging
# ====================

# Log file location
# Default: /var/log/pgvector_install_YYYYMMDD_HHMMSS.log
LOG_FILE="/var/log/pgvector_install_$(date +%Y%m%d_%H%M%S).log"

# Verbose logging (yes/no)
# If "yes", displays detailed PostgreSQL output
VERBOSE_LOGGING="no"
