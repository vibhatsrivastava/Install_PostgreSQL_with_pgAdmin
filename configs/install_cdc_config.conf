###############################################################################
# PostgreSQL CDC & Vector Embedding Configuration
###############################################################################
# This configuration file controls the setup of Change Data Capture (CDC)
# between PostgreSQL databases with automated vector embedding generation.
# 
# IMPORTANT: Secure this file after editing (contains sensitive credentials)
#   chmod 600 configs/install_cdc_config.conf
#
# Usage:
#   1. Edit this file with your desired settings
#   2. Secure the file: chmod 600 configs/install_cdc_config.conf
#   3. Ensure Ollama is accessible:
#      - Local: systemctl status ollama
#      - Remote: curl http://<ollama-server>:11434/api/tags
#   4. Ensure embedding model is available:
#      - Local: ollama pull nomic-embed-text && ollama list
#      - Remote: verify model on remote server
#   5. Update OLLAMA_API_URL in this file if using remote Ollama
#   6. Run: sudo ./install_cdc_replication.sh
###############################################################################

# ====================
# PostgreSQL Settings
# ====================

# PostgreSQL version to target (e.g., "16", "15", "14")
# Leave empty to auto-detect the installed version
POSTGRES_VERSION=""

# PostgreSQL superuser password (from install_config.conf)
# REQUIRED: Used for replication connection and database setup
POSTGRES_PASSWORD="YourSecurePassword123!"

# ====================
# Replication Configuration
# ====================

# Source database containing the data to replicate
# This is where your operational data lives
SOURCE_DATABASE="ansible_execution_results"

# Target database for replicated data with vector embeddings
# This database will be created by the script
TARGET_DATABASE="ansible_failed_jobs_vectordb"

# Table(s) to replicate (comma-separated for multiple tables)
# Currently supports single table - multi-table support is future enhancement
SOURCE_TABLE="failed_jobs"

# Text column to vectorize for semantic search
# This should be a TEXT/VARCHAR column containing meaningful content
TEXT_COLUMN_TO_VECTORIZE="message"

# Publication name (will be created in source database)
PUBLICATION_NAME="ansible_failed_jobs_pub"

# Subscription name (will be created in target database)
SUBSCRIPTION_NAME="ansible_failed_jobs_sub"

# ====================
# Ollama Configuration
# ====================

# Ollama API base URL
# For LOCAL Ollama: http://localhost:11434
# For REMOTE Ollama: http://<ollama-server-ip>:11434 (e.g., http://10.0.0.15:11434)
# Ensure PostgreSQL server can reach Ollama server on port 11434
OLLAMA_API_URL="http://localhost:11434"

# Ollama embedding model to use
# Recommended: nomic-embed-text (768 dimensions, optimized for semantic search)
# Alternatives: mxbai-embed-large (1024d), all-minilm (384d)
OLLAMA_MODEL="nomic-embed-text"

# Embedding vector dimension
# Must match the model's output dimension:
#   - nomic-embed-text: 768
#   - mxbai-embed-large: 1024
#   - all-minilm: 384
EMBEDDING_DIMENSION="768"

# LLM model for future text processing (optional, not used in this version)
# Your gpt-oss:20b model can be configured here for future enhancements
LLM_MODEL="gpt-oss:20b"

# ====================
# Feature Toggles
# ====================

# Enable automated DDL replication (yes/no)
# If "yes", schema changes in source table automatically propagate to target
# Uses event triggers + Python daemon
ENABLE_DDL_REPLICATION="yes"

# Enable automatic vector embedding generation (yes/no)
# If "yes", new/updated rows automatically get vector embeddings via Ollama
# Uses PostgreSQL triggers + plpython3u
ENABLE_EMBEDDING_GENERATION="yes"

# Enable Prometheus monitoring integration (yes/no)
# If "yes", installs postgres_exporter and configures replication metrics
ENABLE_PROMETHEUS_MONITORING="yes"

# ====================
# Embedding Generation Settings
# ====================

# Batch size for backfilling embeddings on existing data
# Smaller batches = less load on Ollama, longer total time
# Recommended: 50-200 depending on your system resources
EMBEDDING_BATCH_SIZE="100"

# Throttle delay between batches (seconds)
# Prevents overwhelming Ollama during backfill
# Recommended: 0.5-2 seconds
EMBEDDING_THROTTLE_SECONDS="1"

# Maximum text length for embedding generation (characters)
# Longer texts will be truncated to avoid API errors
# nomic-embed-text supports up to 8192 tokens (~32k characters)
MAX_TEXT_LENGTH="8000"

# ====================
# DDL Replication Settings
# ====================

# DDL worker poll interval (seconds)
# How often the DDL replication daemon checks for schema changes
# Lower = faster propagation, higher CPU usage
# Recommended: 15-60 seconds
DDL_POLL_INTERVAL_SECONDS="30"

# DDL worker log file
DDL_LOG_FILE="/var/log/ddl_replication.log"

# ====================
# Monitoring Configuration
# ====================

# Prometheus exporter port
# Default: 9187 (standard postgres_exporter port)
PROMETHEUS_PORT="9187"

# Prometheus exporter data source name (DSN)
# Will be auto-constructed from PostgreSQL settings
# Format: postgresql://user:password@host:port/database?sslmode=disable
# Leave empty for auto-configuration
PROMETHEUS_DSN=""

# ====================
# Verification Settings
# ====================

# Run comprehensive verification tests after installation (yes/no)
# Tests include: replication sync, DDL propagation, embedding generation
# Recommended: "yes" to ensure proper setup
RUN_VERIFICATION_TESTS="yes"

# Verbose logging (yes/no)
# If "yes", displays detailed operation output
VERBOSE_LOGGING="no"

# ====================
# Logging
# ====================

# Main installation log file location
LOG_FILE="/var/log/cdc_replication_install_$(date +%Y%m%d_%H%M%S).log"

# ====================
# Advanced Settings
# ====================

# PostgreSQL replication slots to allocate
# Increase if replicating multiple tables/databases
MAX_REPLICATION_SLOTS="10"

# WAL sender processes
# Should be >= number of replication slots
MAX_WAL_SENDERS="10"

# Logical replication workers
# Parallel workers for applying changes
MAX_LOGICAL_REPLICATION_WORKERS="4"

# IVFFlat index configuration (for vector similarity search)
# Number of lists for IVFFlat index partitioning
# Rule of thumb: rows / 1000 for < 1M rows
# Minimum: 1, typical: 100-1000
IVFFLAT_LISTS="100"

###############################################################################
# END OF CONFIGURATION
###############################################################################
