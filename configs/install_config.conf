###############################################################################
# PostgreSQL and pgAdmin4 Installation Configuration
###############################################################################
# This configuration file controls the installation and setup of PostgreSQL
# and pgAdmin4.
# 
# IMPORTANT: Secure this file after editing
#   chmod 600 install_config.conf
#
# Usage:
#   1. Edit this file with your desired settings
#   2. Secure the file: chmod 600 install_config.conf
#   3. Run: sudo ./install_postgresql_pgadmin.sh
###############################################################################

# ====================
# PostgreSQL Settings
# ====================

# Password for the postgres superuser account
# Minimum 8 characters required
# CHANGE THIS BEFORE INSTALLATION!
POSTGRES_PASSWORD="ChangeMe123!"

# Specific PostgreSQL version to install (optional)
# Leave empty or comment out to install the latest version
# Example: POSTGRES_VERSION="16"
POSTGRES_VERSION=""

# ====================
# Custom Database User
# ====================

# Create a custom database user (yes/no)
CREATE_CUSTOM_USER="yes"

# Username for the custom database user
CUSTOM_USERNAME="dbuser"

# Password for the custom database user
# Minimum 8 characters recommended
# CHANGE THIS BEFORE INSTALLATION!
CUSTOM_USER_PASSWORD="SecurePass456!"

# ====================
# Custom Database
# ====================

# Create a custom database (yes/no)
CREATE_CUSTOM_DATABASE="yes"

# Name of the custom database to create
CUSTOM_DATABASE_NAME="myappdb"

# Owner of the custom database (usually the custom user)
CUSTOM_DATABASE_OWNER="dbuser"

# ====================
# pgAdmin Settings
# ====================

# Email address for pgAdmin web interface login
# This will be your username
PGADMIN_EMAIL="admin@example.com"

# Password for pgAdmin web interface
# Minimum 6 characters required
# CHANGE THIS BEFORE INSTALLATION!
PGADMIN_PASSWORD="Admin123!"

# ====================
# Remote Access
# ====================

# Allow remote connections to PostgreSQL (yes/no)
# Recommended: "no" for local development, "yes" for servers
ENABLE_REMOTE_ACCESS="no"

# IP address range allowed to connect remotely (CIDR notation)
# 0.0.0.0/0 allows all IPs (not recommended for production)
# Examples:
#   192.168.1.0/24  - Allow entire subnet
#   10.0.0.5/32     - Allow single IP
ALLOWED_IP_RANGE="0.0.0.0/0"

# ====================
# Performance Tuning
# ====================

# Apply PostgreSQL performance tuning (yes/no)
# Recommended: "yes" for automatic optimization
APPLY_PERFORMANCE_TUNING="yes"

# Performance profile:
#   auto   - Automatically detect system resources and optimize
#   low    - For systems with 1-2GB RAM
#   medium - For systems with 4-8GB RAM
#   high   - For systems with 16GB+ RAM
#   custom - Use custom values defined below
PERFORMANCE_PROFILE="auto"

# ====================
# Custom Performance Settings
# ====================
# Only used when PERFORMANCE_PROFILE="custom"
# Leave commented out for auto profiles

# PostgreSQL shared memory buffers
# Recommended: 25% of system RAM
# Example: "256MB", "1GB", "4GB"
CUSTOM_SHARED_BUFFERS="256MB"

# Effective cache size (OS + PostgreSQL cache)
# Recommended: 50-75% of system RAM
# Example: "1GB", "3GB", "8GB"
CUSTOM_EFFECTIVE_CACHE_SIZE="1GB"

# Memory for maintenance operations (VACUUM, CREATE INDEX, etc.)
# Recommended: 5-10% of RAM
# Example: "64MB", "256MB", "512MB"
CUSTOM_MAINTENANCE_WORK_MEM="64MB"

# Memory per query operation (sorting, hashing)
# Recommended: shared_buffers / max_connections
# Example: "4MB", "16MB", "32MB"
CUSTOM_WORK_MEM="4MB"

# Maximum number of concurrent connections
# Recommended: Based on application needs
# Example: 100, 200, 300
CUSTOM_MAX_CONNECTIONS="100"

# Maximum size of WAL (Write-Ahead Log) before checkpoint
# Higher values = less checkpoints, more memory
# Example: "1GB", "2GB", "4GB"
CUSTOM_MAX_WAL_SIZE="1GB"

# Minimum size of WAL to keep
# Example: "80MB", "1GB", "2GB"
CUSTOM_MIN_WAL_SIZE="80MB"

# Checkpoint completion target (0.0 - 1.0)
# Higher values spread I/O load over longer time
# Recommended: 0.9
CUSTOM_CHECKPOINT_COMPLETION_TARGET="0.9"

# WAL buffer size
# Recommended: 16MB for most systems
# Example: "16MB", "32MB"
CUSTOM_WAL_BUFFERS="16MB"

# Default statistics target for query planner
# Higher values = better query plans, slower ANALYZE
# Recommended: 100 (default), 200 for complex queries
CUSTOM_DEFAULT_STATISTICS_TARGET="100"

# Random page cost (relative to sequential access)
# SSD: 1.1, HDD: 4.0
# Auto-detected if not specified
CUSTOM_RANDOM_PAGE_COST="1.1"

# Effective I/O concurrency (parallel I/O operations)
# SSD: 200, HDD: 2
# Auto-detected if not specified
CUSTOM_EFFECTIVE_IO_CONCURRENCY="200"

# ====================
# Logging
# ====================

# Log file location for installation script
# Leave empty to use temporary log file
LOG_FILE="/var/log/postgresql_pgadmin_install.log"

###############################################################################
# End of Configuration
###############################################################################
